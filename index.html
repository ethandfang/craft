<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini-craft</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #8fc6ff; font-family: monospace; }
  #game { display: block; }

  #crosshair {
    position: fixed; left: 50%; top: 50%; width: 20px; height: 20px;
    transform: translate(-50%, -50%); pointer-events: none; opacity: .85; z-index: 3;
  }
  #crosshair:before, #crosshair:after { content: ""; position: absolute; background: #fff; box-shadow: 0 0 1px #000; }
  #crosshair:before { left: 9px; top: 0; width: 2px; height: 20px; }
  #crosshair:after  { top: 9px; left: 0; height: 2px; width: 20px; }

  #debug {
    position: fixed; left: 10px; top: 10px; z-index: 3;
    color: #fff; font-size: 12px; text-shadow: 0 1px 2px #000; white-space: pre;
  }

  #hotbar {
    position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%);
    display: flex; gap: 4px; padding: 5px; background: rgba(0,0,0,.35);
    border-radius: 6px; z-index: 3;
  }
  .slot {
    position: relative; width: 46px; height: 46px; border: 2px solid #222;
    border-radius: 4px; background: #6b6b6b; display: flex; align-items: center; justify-content: center;
    image-rendering: pixelated;
  }
  .slot canvas { width: 36px; height: 36px; image-rendering: pixelated; }
  .slot .num { position: absolute; top: 1px; left: 3px; color: #fff; font-size: 10px; text-shadow: 0 1px 1px #000; }
  .slot.sel { border-color: #fff; box-shadow: 0 0 0 2px #000 inset; }

  #overlay {
    position: fixed; inset: 0; z-index: 5; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    background: rgba(0,0,0,.55); color: #fff; cursor: pointer;
  }
  #overlay h1 { margin: 0 0 10px; font-size: 42px; letter-spacing: 2px; }
  #overlay p { margin: 3px; opacity: .85; }
</style>

<!-- Import map: load Three.js from CDN so bare `import 'three'` works with no build step -->
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
</head>
<body>
<canvas id="game"></canvas>
<div id="crosshair"></div>
<div id="debug"></div>
<div id="hotbar"></div>

<div id="overlay">
  <h1>MINI-CRAFT</h1>
  <p><b>Click to play</b></p>
  <p>WASD move · Shift sprint · Space jump · Mouse look</p>
  <p>Left-click break · Right-click place</p>
  <p>1–7 keys or scroll to pick a block · Esc to release mouse</p>
  <p style="margin-top:10px;opacity:.6">Terrain, caves, water &amp; trees are procedurally generated. Edits auto-save.</p>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
